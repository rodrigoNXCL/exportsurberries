[build]
  command = "npm run build"
  publish = "dist"

# ============================================
# EXCEPCIONES - Estas van ANTES del catch-all
# ============================================

# 1. Admin Analytics - NO redirigir (SSR serverless)
[[redirects]]
  from = "/admin/*"
  to = "/admin/:splat"
  status = 200
  force = true

# 2. APIs - NO redirigir (SSR serverless)
[[redirects]]
  from = "/api/*"
  to = "/api/:splat"
  status = 200
  force = true

# 3. Portal - NO redirigir (SSR serverless)
[[redirects]]
  from = "/portal/*"
  to = "/portal/:splat"
  status = 200
  force = true

# 4. Fichas técnicas - NO redirigir (archivos estáticos)
[[redirects]]
  from = "/fichas/*"
  to = "/fichas/:splat"
  status = 200
  force = true

# 5. Idioma inglés - NO redirigir
[[redirects]]
  from = "/en/*"
  to = "/en/:splat"
  status = 200
  force = true

# ============================================
# CATCH-ALL - Para SPA (va AL FINAL)
# ============================================
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ============================================
# HEADERS - Cache y seguridad
# ============================================
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"

[[headers]]
  for = "/fichas/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"